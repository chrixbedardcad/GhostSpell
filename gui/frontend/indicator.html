<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; }
  html, body {
    width: 100%;
    height: 100%;
    background: transparent;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .ghost-wrap {
    animation: float 2s ease-in-out infinite;
  }
  @keyframes float {
    0%   { transform: translateY(0px); }
    50%  { transform: translateY(-8px); }
    100% { transform: translateY(0px); }
  }
  .ghost-wrap img {
    width: 48px;
    height: 48px;
    object-fit: contain;
  }
</style>
</head>
<body>
<div class="ghost-wrap">
  <img src="/ghostspell-ghost.png" alt="GhostSpell">
</div>
</body>
</html>
