<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GhostType Settings</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #1e1e2e;
    color: #cdd6f4;
    min-height: 100vh;
    overflow-y: auto;
  }
  h1 { font-size: 1.4em; font-weight: 600; color: #cdd6f4; }
  h2 { font-size: 1.1em; font-weight: 600; color: #bac2de; margin-bottom: 12px; }

  .container { max-width: 640px; margin: 0 auto; padding: 24px; }
  .header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 24px; padding-bottom: 16px;
    border-bottom: 1px solid #313244;
  }
  .header .logo { font-size: 1.8em; }

  /* --- Form elements --- */
  .form-group { margin-bottom: 16px; }
  .form-group label {
    display: block; font-size: 0.85em; color: #bac2de;
    margin-bottom: 4px; font-weight: 500;
  }
  input[type="text"], input[type="password"], select {
    width: 100%; padding: 10px 12px;
    background: #313244; border: 1px solid #45475a;
    border-radius: 6px; color: #cdd6f4; font-size: 0.9em;
    outline: none; transition: border-color 0.15s;
  }
  input:focus, select:focus { border-color: #89b4fa; }
  select { cursor: pointer; }

  /* --- Buttons --- */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 10px 20px; border: none; border-radius: 6px;
    font-size: 0.9em; font-weight: 500; cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
  }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-primary { background: #89b4fa; color: #1e1e2e; }
  .btn-primary:hover:not(:disabled) { background: #74c7ec; }
  .btn-secondary { background: #45475a; color: #cdd6f4; }
  .btn-secondary:hover:not(:disabled) { background: #585b70; }
  .btn-danger { background: #f38ba8; color: #1e1e2e; }
  .btn-danger:hover:not(:disabled) { background: #eba0ac; }
  .btn-sm { padding: 6px 12px; font-size: 0.8em; }
  .btn-row { display: flex; gap: 8px; margin-top: 16px; }

  /* --- Status messages --- */
  .status {
    padding: 8px 12px; border-radius: 6px; font-size: 0.85em;
    margin-top: 12px; display: none;
  }
  .status.success { display: block; background: #1e3a2e; color: #a6e3a1; border: 1px solid #a6e3a1; }
  .status.error { display: block; background: #3a1e1e; color: #f38ba8; border: 1px solid #f38ba8; }
  .status.info { display: block; background: #1e2e3a; color: #89b4fa; border: 1px solid #89b4fa; }

  /* --- Settings provider list --- */
  .provider-list-item {
    background: #313244; border: 1px solid #45475a;
    border-radius: 8px; padding: 14px; margin-bottom: 8px;
  }
  .provider-list-item .top-row {
    display: flex; justify-content: space-between; align-items: center;
  }
  .provider-list-item .info .label { font-weight: 600; font-size: 0.95em; }
  .provider-list-item .info .meta { font-size: 0.8em; color: #a6adc8; margin-top: 2px; }
  .provider-list-item .default-badge {
    background: #a6e3a1; color: #1e1e2e; font-size: 0.7em;
    padding: 2px 8px; border-radius: 4px; font-weight: 600; margin-left: 8px;
  }
  .provider-list-item .actions { display: flex; gap: 6px; }
  .provider-list-item .test-result {
    font-size: 0.8em; margin-top: 8px; padding: 4px 8px;
    border-radius: 4px; display: none;
  }
  .provider-list-item .test-result.pass {
    display: block; background: #1e3a2e; color: #a6e3a1;
  }
  .provider-list-item .test-result.fail {
    display: block; background: #3a1e1e; color: #f38ba8;
  }

  .empty-state {
    text-align: center; padding: 40px; color: #6c7086;
    font-size: 0.9em;
  }

  /* Toolbar */
  .toolbar {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px;
  }

  /* --- Ollama panel --- */
  .ollama-panel {
    background: #1e1e2e; border: 1px solid #45475a; border-radius: 8px;
    padding: 14px; margin: 12px 0;
  }
  .ollama-panel h3 {
    font-size: 0.95em; font-weight: 600; color: #cdd6f4; margin-bottom: 10px;
  }
  .ollama-status-bar {
    display: flex; align-items: center; gap: 8px; padding: 8px 12px;
    border-radius: 6px; font-size: 0.85em; margin-bottom: 10px;
  }
  .ollama-status-bar.running { background: #1e3a2e; color: #a6e3a1; }
  .ollama-status-bar.installed { background: #1e2e3a; color: #89b4fa; }
  .ollama-status-bar.not-installed { background: #3a1e1e; color: #f38ba8; }
  .ollama-status-bar.checking { background: #2a2a3e; color: #a6adc8; }
  .ollama-status-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .ollama-status-bar.running .ollama-status-dot { background: #a6e3a1; }
  .ollama-status-bar.installed .ollama-status-dot { background: #89b4fa; }
  .ollama-status-bar.not-installed .ollama-status-dot { background: #f38ba8; }
  .ollama-status-bar.checking .ollama-status-dot { background: #a6adc8; }

  .ollama-model-list { margin: 8px 0; }
  .ollama-model-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 10px; background: #313244; border-radius: 6px;
    margin-bottom: 4px; font-size: 0.85em;
  }
  .ollama-model-item .model-info {
    display: flex; flex-direction: column; gap: 2px; min-width: 0; flex: 1;
  }
  .ollama-model-item .model-name { font-weight: 600; color: #cdd6f4; }
  .ollama-model-item .model-meta { font-size: 0.8em; color: #a6adc8; }
  .ollama-model-item .model-actions { display: flex; gap: 4px; flex-shrink: 0; }

  .ollama-pull-section { margin-top: 10px; }
  .ollama-pull-row {
    display: flex; gap: 6px; align-items: center;
  }
  .ollama-pull-row select { flex: 1; }

  .progress-bar-bg {
    width: 100%; height: 20px; background: #313244; border-radius: 4px;
    overflow: hidden; margin-top: 8px; position: relative;
  }
  .progress-bar-fill {
    height: 100%; background: #89b4fa; border-radius: 4px;
    transition: width 0.3s ease;
  }
  .progress-bar-text {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75em; color: #cdd6f4; font-weight: 600;
  }
  .ollama-progress-info {
    font-size: 0.8em; color: #a6adc8; margin-top: 4px;
    display: flex; justify-content: space-between; align-items: center;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <span class="logo">&#128123;</span>
    <div>
      <h1>GhostType Settings</h1>
      <div style="font-size:0.8em;color:#6c7086">Manage your providers</div>
    </div>
  </div>

  <!-- ============ SETTINGS VIEW ============ -->
  <div id="settings">
    <div class="toolbar">
      <h2 style="margin-bottom:0">Providers</h2>
      <div style="display:flex;gap:8px">
        <button class="btn btn-secondary btn-sm" onclick="onOpenConfigFile()">Open config.json</button>
        <button class="btn btn-primary btn-sm" onclick="showAddProvider()">+ Add Provider</button>
      </div>
    </div>
    <div id="provider-list"></div>

    <!-- Add/Edit provider form (hidden by default) -->
    <div id="provider-form" style="display:none;margin-top:16px;padding:16px;background:#313244;border-radius:8px">
      <h2 id="form-title">Add Provider</h2>
      <input type="hidden" id="edit-original-label" value="">
      <div class="form-group">
        <label for="form-provider">Provider</label>
        <select id="form-provider" onchange="onFormProviderChange()">
          <option value="anthropic">Anthropic</option>
          <option value="openai">OpenAI</option>
          <option value="gemini">Google Gemini</option>
          <option value="xai">xAI</option>
          <option value="ollama">Ollama</option>
        </select>
      </div>
      <div class="form-group">
        <label for="form-label">Label</label>
        <input type="text" id="form-label" placeholder="e.g. my-claude">
      </div>
      <div class="form-group" id="form-apikey-group">
        <label for="form-apikey">API Key</label>
        <input type="password" id="form-apikey" placeholder="sk-...">
      </div>

      <!-- Ollama inline panel (shown when provider = ollama) -->
      <div id="ollama-panel" class="ollama-panel" style="display:none">
        <h3>Ollama Status</h3>
        <div id="ollama-status-bar" class="ollama-status-bar checking">
          <span class="ollama-status-dot"></span>
          <span id="ollama-status-text">Checking...</span>
          <span style="flex:1"></span>
          <button class="btn btn-secondary btn-sm" onclick="onOllamaCheck()" style="padding:4px 10px;font-size:0.8em">Refresh</button>
        </div>

        <!-- Action buttons (install / start) -->
        <div id="ollama-actions" style="display:none;margin-bottom:10px">
          <div style="display:flex;gap:6px">
            <button id="ollama-install-btn" class="btn btn-primary btn-sm" onclick="onOllamaInstall()" style="display:none">Download &amp; Install Ollama</button>
            <button id="ollama-start-btn" class="btn btn-primary btn-sm" onclick="onOllamaStartServe()" style="display:none">Start Ollama Server</button>
          </div>
          <div id="ollama-action-status" class="status" style="margin-top:6px"></div>
        </div>

        <!-- Installed models -->
        <div id="ollama-models-section" style="display:none">
          <div style="font-size:0.85em;font-weight:600;color:#bac2de;margin-bottom:6px">Installed Models</div>
          <div id="ollama-model-list" class="ollama-model-list"></div>
        </div>

        <!-- Download new model -->
        <div id="ollama-pull-section" class="ollama-pull-section" style="display:none">
          <div style="font-size:0.85em;font-weight:600;color:#bac2de;margin-bottom:6px">Download Model</div>
          <div class="ollama-pull-row">
            <select id="ollama-pull-select"></select>
            <button class="btn btn-primary btn-sm" onclick="onOllamaPull()" id="ollama-pull-btn">Download</button>
          </div>
          <!-- Progress bar -->
          <div id="ollama-progress" style="display:none">
            <div class="progress-bar-bg">
              <div class="progress-bar-fill" id="ollama-progress-fill" style="width:0%"></div>
              <div class="progress-bar-text" id="ollama-progress-text">0%</div>
            </div>
            <div class="ollama-progress-info">
              <span id="ollama-progress-status">Starting...</span>
              <button class="btn btn-danger btn-sm" onclick="onOllamaCancelPull()" style="padding:2px 8px;font-size:0.75em">Cancel</button>
            </div>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="form-model">Model</label>
        <select id="form-model"></select>
      </div>
      <div class="form-group" id="form-endpoint-group" style="display:none">
        <label for="form-endpoint">API Endpoint (optional)</label>
        <input type="text" id="form-endpoint" placeholder="http://localhost:11434">
      </div>
      <div class="btn-row">
        <button class="btn btn-secondary" onclick="cancelForm()">Cancel</button>
        <button class="btn btn-secondary" onclick="testForm()">Test Connection</button>
        <button class="btn btn-primary" onclick="saveForm()">Save</button>
      </div>
      <div class="status" id="form-status"></div>
    </div>
  </div>
</div>

<script>
// ---- State ----
let configData = null;

// ---- Go bridge helpers ----
async function goCall(fn, ...args) {
  try {
    const f = window[fn];
    if (!f) { console.error('Bridge function not found:', fn); return null; }
    return await f(...args);
  } catch (e) {
    console.error('Bridge call failed:', fn, e);
    return null;
  }
}

// ---- Init ----
async function init() {
  const raw = await goCall('getConfig');
  if (raw) configData = JSON.parse(raw);
  renderProviderList();
}

// ---- Settings ----
async function renderProviderList() {
  const raw = await goCall('getConfig');
  if (raw) configData = JSON.parse(raw);

  const container = document.getElementById('provider-list');
  const providers = configData.llm_providers || {};
  const defaultLLM = configData.default_llm || '';

  if (Object.keys(providers).length === 0) {
    container.innerHTML = '<div class="empty-state">No providers configured.<br>Click "+ Add Provider" to get started.</div>';
    return;
  }

  let html = '';
  for (const [label, def] of Object.entries(providers)) {
    const isDefault = label === defaultLLM;
    const maskedKey = def.api_key ? '****' + def.api_key.slice(-4) : (def.provider === 'ollama' ? 'local' : 'none');
    html += `
      <div class="provider-list-item" id="card-${esc(label)}">
        <div class="top-row">
          <div class="info">
            <div class="label">${esc(label)}${isDefault ? '<span class="default-badge">DEFAULT</span>' : ''}</div>
            <div class="meta">${esc(def.provider)} / ${esc(def.model)} &middot; key: ${esc(maskedKey)}</div>
          </div>
          <div class="actions">
            <button class="btn btn-secondary btn-sm" onclick="onTestProvider('${escJS(label)}')" id="test-btn-${esc(label)}">Test</button>
            ${!isDefault ? `<button class="btn btn-secondary btn-sm" onclick="onSetDefault('${escJS(label)}')">Set Default</button>` : ''}
            <button class="btn btn-secondary btn-sm" onclick="onEditProvider('${escJS(label)}')">Edit</button>
            <button class="btn btn-danger btn-sm" onclick="onDeleteProvider('${escJS(label)}')">Delete</button>
          </div>
        </div>
        <div class="test-result" id="test-result-${esc(label)}"></div>
      </div>`;
  }
  container.innerHTML = html;
}

async function onTestProvider(label) {
  const btn = document.getElementById('test-btn-' + label);
  const result_el = document.getElementById('test-result-' + label);
  if (btn) { btn.disabled = true; btn.textContent = 'Testing...'; }
  if (result_el) {
    result_el.className = 'test-result';
    result_el.style.display = 'none';
  }

  const result = await goCall('testProvider', label);

  if (btn) { btn.disabled = false; btn.textContent = 'Test'; }
  if (!result_el) return;
  if (result && result.startsWith('ok')) {
    result_el.className = 'test-result pass';
    result_el.textContent = '\u2714 Connection successful';
    result_el.style.display = 'block';
  } else {
    result_el.className = 'test-result fail';
    result_el.textContent = '\u2718 ' + (result || 'Connection failed');
    result_el.style.display = 'block';
  }
}

function showAddProvider() {
  document.getElementById('provider-form').style.display = 'block';
  document.getElementById('form-title').textContent = 'Add Provider';
  document.getElementById('edit-original-label').value = '';
  document.getElementById('form-provider').value = 'anthropic';
  document.getElementById('form-label').value = '';
  document.getElementById('form-apikey').value = '';
  document.getElementById('form-endpoint').value = '';
  onFormProviderChange();
  clearStatus('form-status');
}

function onEditProvider(label) {
  const def = configData.llm_providers[label];
  if (!def) return;

  document.getElementById('provider-form').style.display = 'block';
  document.getElementById('form-title').textContent = 'Edit Provider';
  document.getElementById('edit-original-label').value = label;
  document.getElementById('form-provider').value = def.provider;
  document.getElementById('form-label').value = label;
  document.getElementById('form-apikey').value = def.api_key || '';
  document.getElementById('form-endpoint').value = def.api_endpoint || '';
  onFormProviderChange();
  document.getElementById('form-model').value = def.model;
  clearStatus('form-status');
}

function onDeleteProvider(label) {
  // Two-click delete: first click swaps button to "Confirm?", second click deletes.
  const card = document.getElementById('card-' + label);
  if (!card) return;
  const btn = card.querySelector('.btn-danger');
  if (!btn) return;

  if (btn.dataset.confirming === 'true') {
    // Second click — do the delete.
    doDelete(label);
  } else {
    // First click — show confirmation.
    btn.dataset.confirming = 'true';
    btn.textContent = 'Confirm?';
    setTimeout(() => {
      // Reset after 3 seconds if not confirmed.
      if (btn.dataset.confirming === 'true') {
        btn.dataset.confirming = '';
        btn.textContent = 'Delete';
      }
    }, 3000);
  }
}

async function doDelete(label) {
  const result = await goCall('deleteProvider', label);
  if (result && result.startsWith('ok')) {
    renderProviderList();
  } else {
    const el = document.getElementById('test-result-' + label);
    if (el) {
      el.className = 'test-result fail';
      el.textContent = '\u2718 Delete failed: ' + (result || 'unknown error');
      el.style.display = 'block';
    }
  }
}

async function onSetDefault(label) {
  const result = await goCall('setDefault', label);
  if (result && result.startsWith('ok')) {
    renderProviderList();
  } else {
    const el = document.getElementById('test-result-' + label);
    if (el) {
      el.className = 'test-result fail';
      el.textContent = '\u2718 Set default failed: ' + (result || 'unknown error');
      el.style.display = 'block';
    }
  }
}

function cancelForm() {
  document.getElementById('provider-form').style.display = 'none';
}

function onFormProviderChange() {
  const provider = document.getElementById('form-provider').value;
  const isOllama = provider === 'ollama';
  document.getElementById('form-apikey-group').style.display = isOllama ? 'none' : 'block';
  document.getElementById('form-endpoint-group').style.display = isOllama ? 'block' : 'none';
  document.getElementById('ollama-panel').style.display = isOllama ? 'block' : 'none';
  loadModels('form-model', provider);
  if (isOllama) {
    onOllamaCheck();
  }
}

async function testForm() {
  clearStatus('form-status');
  const provider = document.getElementById('form-provider').value;
  const apiKey = document.getElementById('form-apikey').value.trim();
  const model = document.getElementById('form-model').value;
  const endpoint = document.getElementById('form-endpoint').value.trim();

  setStatus('form-status', 'info', 'Testing...');
  const result = await goCall('testConnection', provider, apiKey, model, endpoint);

  if (result && result.startsWith('ok')) {
    setStatus('form-status', 'success', 'Connection successful!');
  } else {
    setStatus('form-status', 'error', result || 'Connection failed');
  }
}

async function saveForm() {
  const label = document.getElementById('form-label').value.trim();
  const provider = document.getElementById('form-provider').value;
  const apiKey = document.getElementById('form-apikey').value.trim();
  const model = document.getElementById('form-model').value;
  const endpoint = document.getElementById('form-endpoint').value.trim();
  const originalLabel = document.getElementById('edit-original-label').value;

  if (!label) { setStatus('form-status','error','Label is required'); return; }
  if (provider !== 'ollama' && !apiKey) { setStatus('form-status','error','API key is required'); return; }
  if (!model) { setStatus('form-status','error','Model is required'); return; }

  const result = await goCall('saveProvider', label, provider, apiKey, model, endpoint, originalLabel);
  if (result && result.startsWith('ok')) {
    document.getElementById('provider-form').style.display = 'none';
    renderProviderList();
  } else {
    setStatus('form-status', 'error', result || 'Save failed');
  }
}

async function onOpenConfigFile() {
  await goCall('openConfigFile');
}

// ---- Model dropdown ----
async function loadModels(selectId, provider) {
  const sel = document.getElementById(selectId);
  sel.innerHTML = '';

  const raw = await goCall('getKnownModels', provider);
  let models = [];
  if (raw) {
    try { models = JSON.parse(raw); } catch(e) {}
  }

  for (const m of models) {
    const opt = document.createElement('option');
    opt.value = m;
    opt.textContent = m;
    sel.appendChild(opt);
  }

  // Add custom option
  const opt = document.createElement('option');
  opt.value = '__custom__';
  opt.textContent = '(custom model...)';
  sel.appendChild(opt);

  sel.onchange = function() {
    if (this.value === '__custom__') {
      const custom = prompt('Enter model name:');
      if (custom && custom.trim()) {
        const newOpt = document.createElement('option');
        newOpt.value = custom.trim();
        newOpt.textContent = custom.trim();
        this.insertBefore(newOpt, this.lastChild);
        this.value = custom.trim();
      } else {
        this.selectedIndex = 0;
      }
    }
  };
}

// ---- Helpers ----
function setStatus(id, type, msg) {
  const el = document.getElementById(id);
  el.className = 'status ' + type;
  el.textContent = msg;
}

function clearStatus(id) {
  const el = document.getElementById(id);
  el.className = 'status';
  el.textContent = '';
}

function esc(s) {
  const el = document.createElement('span');
  el.textContent = s;
  return el.innerHTML;
}

// escJS escapes a string for safe use inside JS single-quoted string literals
// (inline onclick handlers). Handles backslashes, single quotes, and newlines.
function escJS(s) {
  return String(s).replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/\n/g, '\\n').replace(/\r/g, '\\r');
}

// ---- Ollama panel functions ----
let ollamaPollTimer = null;

async function onOllamaCheck() {
  const bar = document.getElementById('ollama-status-bar');
  const text = document.getElementById('ollama-status-text');
  bar.className = 'ollama-status-bar checking';
  text.textContent = 'Checking...';

  const endpoint = document.getElementById('form-endpoint').value.trim();
  const raw = await goCall('ollamaStatus', endpoint);
  if (!raw) {
    bar.className = 'ollama-status-bar not-installed';
    text.textContent = 'Could not check status';
    onOllamaUpdateActions('not_installed');
    return;
  }

  let st;
  try { st = JSON.parse(raw); } catch(e) {
    bar.className = 'ollama-status-bar not-installed';
    text.textContent = 'Status check failed';
    onOllamaUpdateActions('not_installed');
    return;
  }

  const status = st.status || 'not_installed';
  if (status === 'running') {
    bar.className = 'ollama-status-bar running';
    text.textContent = 'Running' + (st.version ? ' — ' + st.version : '');
    onOllamaUpdateActions('running');
    onOllamaRefreshModels();
  } else if (status === 'installed') {
    bar.className = 'ollama-status-bar installed';
    text.textContent = 'Installed but not running';
    onOllamaUpdateActions('installed');
  } else {
    bar.className = 'ollama-status-bar not-installed';
    text.textContent = 'Not installed';
    onOllamaUpdateActions('not_installed');
  }
}

function onOllamaUpdateActions(status) {
  const actionsDiv = document.getElementById('ollama-actions');
  const installBtn = document.getElementById('ollama-install-btn');
  const startBtn = document.getElementById('ollama-start-btn');
  const modelsSection = document.getElementById('ollama-models-section');
  const pullSection = document.getElementById('ollama-pull-section');

  installBtn.style.display = 'none';
  startBtn.style.display = 'none';
  actionsDiv.style.display = 'none';
  modelsSection.style.display = 'none';
  pullSection.style.display = 'none';

  if (status === 'running') {
    modelsSection.style.display = 'block';
    pullSection.style.display = 'block';
    onOllamaLoadPullDropdown();
  } else if (status === 'installed') {
    actionsDiv.style.display = 'block';
    startBtn.style.display = 'inline-flex';
  } else {
    actionsDiv.style.display = 'block';
    installBtn.style.display = 'inline-flex';
  }
}

async function onOllamaInstall() {
  const btn = document.getElementById('ollama-install-btn');
  const statusEl = document.getElementById('ollama-action-status');
  btn.disabled = true;
  btn.textContent = 'Downloading...';
  statusEl.className = 'status info';
  statusEl.textContent = 'Downloading Ollama installer...';

  const result = await goCall('ollamaDownloadInstaller');
  btn.disabled = false;
  btn.textContent = 'Download & Install Ollama';

  if (result && result.startsWith('ok')) {
    statusEl.className = 'status success';
    statusEl.textContent = 'Installer launched! Complete the setup, then click Refresh.';
  } else {
    statusEl.className = 'status error';
    statusEl.textContent = result || 'Download failed';
  }
}

async function onOllamaStartServe() {
  const btn = document.getElementById('ollama-start-btn');
  const statusEl = document.getElementById('ollama-action-status');
  btn.disabled = true;
  btn.textContent = 'Starting...';
  statusEl.className = 'status info';
  statusEl.textContent = 'Starting Ollama server...';

  const result = await goCall('ollamaStartServeCmd');
  btn.disabled = false;
  btn.textContent = 'Start Ollama Server';

  if (result && result.startsWith('ok')) {
    statusEl.className = 'status';
    statusEl.textContent = '';
    onOllamaCheck();
  } else {
    statusEl.className = 'status error';
    statusEl.textContent = result || 'Failed to start server';
  }
}

async function onOllamaRefreshModels() {
  const container = document.getElementById('ollama-model-list');
  container.innerHTML = '<div style="color:#a6adc8;font-size:0.8em">Loading...</div>';

  const endpoint = document.getElementById('form-endpoint').value.trim();
  const raw = await goCall('ollamaListModels', endpoint);
  let models = [];
  if (raw) {
    try { models = JSON.parse(raw); } catch(e) {}
  }

  if (models.length === 0) {
    container.innerHTML = '<div style="color:#6c7086;font-size:0.8em;padding:8px">No models installed. Download one below.</div>';
    return;
  }

  let html = '';
  for (const m of models) {
    const meta = [m.parameter_size, m.quantization_level, m.size_human].filter(Boolean).join(' · ');
    html += `<div class="ollama-model-item">
      <div class="model-info">
        <span class="model-name">${esc(m.name)}</span>
        <span class="model-meta">${esc(meta)}</span>
      </div>
      <div class="model-actions">
        <button class="btn btn-primary btn-sm" style="padding:3px 8px;font-size:0.75em" onclick="onOllamaSelectModel('${escJS(m.name)}')">Use</button>
        <button class="btn btn-danger btn-sm" style="padding:3px 8px;font-size:0.75em" onclick="onOllamaDeleteModel('${escJS(m.name)}')">Delete</button>
      </div>
    </div>`;
  }
  container.innerHTML = html;
}

async function onOllamaLoadPullDropdown() {
  const sel = document.getElementById('ollama-pull-select');
  sel.innerHTML = '';

  const raw = await goCall('getKnownModels', 'ollama');
  let models = [];
  if (raw) {
    try { models = JSON.parse(raw); } catch(e) {}
  }

  for (const m of models) {
    const opt = document.createElement('option');
    opt.value = m;
    opt.textContent = m;
    sel.appendChild(opt);
  }

  const custom = document.createElement('option');
  custom.value = '__custom__';
  custom.textContent = '(custom model...)';
  sel.appendChild(custom);

  sel.onchange = function() {
    if (this.value === '__custom__') {
      const name = prompt('Enter model name (e.g. llama3.2:7b):');
      if (name && name.trim()) {
        const opt = document.createElement('option');
        opt.value = name.trim();
        opt.textContent = name.trim();
        this.insertBefore(opt, this.lastChild);
        this.value = name.trim();
      } else {
        this.selectedIndex = 0;
      }
    }
  };
}

async function onOllamaPull() {
  const model = document.getElementById('ollama-pull-select').value;
  if (!model || model === '__custom__') return;

  const endpoint = document.getElementById('form-endpoint').value.trim();
  const result = await goCall('ollamaPullModel', model, endpoint);
  if (!result || !result.startsWith('ok')) return;

  document.getElementById('ollama-progress').style.display = 'block';
  document.getElementById('ollama-pull-btn').disabled = true;

  // Start polling progress every 500ms.
  if (ollamaPollTimer) clearInterval(ollamaPollTimer);
  ollamaPollTimer = setInterval(onOllamaPollProgress, 500);
}

async function onOllamaPollProgress() {
  const raw = await goCall('ollamaGetPullProgress');
  if (!raw) return;

  let p;
  try { p = JSON.parse(raw); } catch(e) { return; }

  const fill = document.getElementById('ollama-progress-fill');
  const text = document.getElementById('ollama-progress-text');
  const status = document.getElementById('ollama-progress-status');

  const pct = Math.min(Math.round(p.pct || 0), 100);
  fill.style.width = pct + '%';
  text.textContent = pct + '%';

  let info = p.status || '';
  if (p.completed > 0 && p.total > 0) {
    info += ' — ' + onOllamaFormatBytes(p.completed) + ' / ' + onOllamaFormatBytes(p.total);
  }
  status.textContent = info;

  if (p.done || p.error) {
    clearInterval(ollamaPollTimer);
    ollamaPollTimer = null;
    document.getElementById('ollama-pull-btn').disabled = false;

    if (p.error) {
      status.textContent = 'Error: ' + p.error;
    } else {
      document.getElementById('ollama-progress').style.display = 'none';
      fill.style.width = '0%';
      text.textContent = '0%';
      onOllamaRefreshModels();
    }
  }
}

async function onOllamaCancelPull() {
  await goCall('ollamaCancelPull');
  if (ollamaPollTimer) {
    clearInterval(ollamaPollTimer);
    ollamaPollTimer = null;
  }
  document.getElementById('ollama-progress').style.display = 'none';
  document.getElementById('ollama-pull-btn').disabled = false;
}

function onOllamaSelectModel(name) {
  // Strip the :tag if present for the model dropdown value,
  // but also add it as an option if not present.
  const sel = document.getElementById('form-model');
  let found = false;
  for (const opt of sel.options) {
    if (opt.value === name) { found = true; break; }
  }
  if (!found) {
    const opt = document.createElement('option');
    opt.value = name;
    opt.textContent = name;
    sel.insertBefore(opt, sel.lastChild);
  }
  sel.value = name;

  // Auto-fill label if empty.
  const labelEl = document.getElementById('form-label');
  if (!labelEl.value.trim()) {
    labelEl.value = 'ollama-' + name.replace(/[:/]/g, '-');
  }
}

async function onOllamaDeleteModel(name) {
  if (!confirm('Delete model "' + name + '"? This cannot be undone.')) return;

  const endpoint = document.getElementById('form-endpoint').value.trim();
  const result = await goCall('ollamaDeleteModel', name, endpoint);
  if (result && result.startsWith('ok')) {
    onOllamaRefreshModels();
  } else {
    alert('Delete failed: ' + (result || 'unknown error'));
  }
}

function onOllamaFormatBytes(bytes) {
  if (bytes < 1024) return bytes + ' B';
  const units = ['KB', 'MB', 'GB', 'TB'];
  let u = -1;
  let b = bytes;
  do { b /= 1024; u++; } while (b >= 1024 && u < units.length - 1);
  return b.toFixed(1) + ' ' + units[u];
}

// ---- Boot ----
document.addEventListener('DOMContentLoaded', init);
</script>
