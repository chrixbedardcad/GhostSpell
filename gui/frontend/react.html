<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GhostSpell</title>
</head>
<body>
  <div id="root"></div>
  <!-- Wails runtime is loaded dynamically to avoid Vite build warnings.
       The /wails/ path is served by Wails at runtime, not available during build. -->
  <script>
    var s = document.createElement("script");
    s.src = "/wails/runtime.js";
    document.head.appendChild(s);
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
